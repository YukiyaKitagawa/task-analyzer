<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動ログ レポート</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
    --text: #f1f5f9; --text2: #94a3b8; --accent: #38bdf8; --accent2: #818cf8;
    --green: #34d399; --orange: #fb923c; --pink: #f472b6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  h1 { font-size: 1.5rem; font-weight: 700; }
  .month-nav { display: flex; align-items: center; gap: 8px; }
  .month-nav button { background: var(--surface2); border: none; color: var(--text); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 1rem; }
  .month-nav button:hover { background: var(--accent); color: var(--bg); }
  .month-label { font-size: 1.1rem; font-weight: 600; min-width: 120px; text-align: center; }

  .main-layout { display: flex; gap: 20px; align-items: start; }
  .left-col { flex: 1; min-width: 0; }
  .left-col .card { overflow-x: auto; }
  .right-col { width: 380px; flex-shrink: 0; }
  @media (max-width: 1100px) { .main-layout { flex-direction: column; } .right-col { width: 100%; } }

  .left-col { display: flex; flex-direction: column; gap: 16px; }
  .right-col { display: flex; flex-direction: column; gap: 16px; position: sticky; top: 20px; }

  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  @media (max-width: 900px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
  .stat-card { background: var(--surface); border-radius: 12px; padding: 16px; }
  .stat-card .label { color: var(--text2); font-size: 0.8rem; margin-bottom: 4px; }
  .stat-card .value { font-size: 1.5rem; font-weight: 700; }
  .stat-card .value.hours { color: var(--accent); }
  .stat-card .value.days { color: var(--green); }
  .stat-card .value.location { color: var(--orange); font-size: 1.1rem; }

  .card { background: var(--surface); border-radius: 12px; padding: 20px; }
  .card h2 { font-size: 0.95rem; color: var(--text2); margin-bottom: 14px; font-weight: 600; }
  .chart-wrap { position: relative; max-height: 220px; display: flex; justify-content: center; }

  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--surface2); font-size: 0.85rem; }
  th { color: var(--text2); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; }
  td.hours { color: var(--accent); font-weight: 600; text-align: right; }
  td.location { color: var(--orange); }
  td.task { color: var(--text2); max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  td.date { white-space: nowrap; }

  .day-categories { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .day-cat { font-size: 0.7rem; padding: 1px 6px; border-radius: 3px; background: var(--surface2); color: var(--text2); }
  .day-cat.unknown { background: #7f1d1d; color: #fca5a5; cursor: pointer; }
  .day-cat.unknown:hover { background: #991b1b; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: var(--surface); border-radius: 12px; padding: 24px; min-width: 360px; max-width: 500px; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 1rem; margin-bottom: 16px; }
  .modal select, .modal input[type="text"], .modal input[type="number"] { width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--surface2); background: var(--bg); color: var(--text); font-size: 0.9rem; margin-bottom: 8px; }
  .modal label { display: block; color: var(--text2); font-size: 0.8rem; margin-bottom: 4px; margin-top: 8px; }
  .edit-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
  .edit-row select { flex: 1; margin-bottom: 0; }
  .edit-row input[type="number"] { width: 70px; margin-bottom: 0; }
  .edit-row .btn-del { background: #7f1d1d; color: #fca5a5; padding: 6px 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
  .btn-add { background: var(--surface2); color: var(--text); padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; margin-bottom: 12px; }
  .section-divider { border-top: 1px solid var(--surface2); margin: 12px 0; }

  tr.editable { cursor: pointer; }
  tr.editable:hover td { background: var(--surface2); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btns button { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.9rem; }
  .btn-save { background: var(--accent); color: var(--bg); font-weight: 600; }
  .btn-cancel { background: var(--surface2); color: var(--text); }
  .btn-danger { background: #7f1d1d; color: #fca5a5; font-weight: 600; margin-right: auto; }
  .btn-danger:hover { background: #991b1b; }

  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
  .tag-unknown { background: #7f1d1d; color: #fca5a5; }

  .empty { color: var(--text2); text-align: center; padding: 40px; }
  .loading { color: var(--text2); text-align: center; padding: 60px; font-size: 1.1rem; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Activity Report</h1>
    <a href="yearly.html" style="color:var(--accent);font-size:0.85rem;text-decoration:none;margin-left:12px">年次レポート →</a>
    <div class="month-nav">
      <button id="prevMonth">&lt;</button>
      <span class="month-label" id="monthLabel"></span>
      <button id="nextMonth">&gt;</button>
    </div>
  </header>

  <div id="content"><div class="loading">読み込み中...</div></div>
</div>

<script>
const SUPABASE_URL = "https://jkacguhaabaqtrjaahgl.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImprYWNndWhhYWJhcXRyamFhaGdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNTIxNjAsImV4cCI6MjA5NzcyODE2MH0.6BnIs9aq4pM9DKicbdiEBG95fvw4Oyihd4YW4_Q1U4c";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const CATEGORY_COLORS = {
  "CAD": "#3b82f6", "設計": "#22c55e", "測量": "#0ea5e9", "点群": "#06b6d4",
  "文書": "#d97706", "文書作成": "#6366f1", "資料作成": "#a5b4fc",
  "集計・表計算": "#14b8a6", "積算": "#f59e0b", "画像": "#ec4899", "動画": "#f97316",
  "開発": "#0d9488", "メール": "#84cc16",
  "会議": "#f43f5e", "Web作業": "#10b981", "AI活用": "#7dd3fc",
  "調査・リサーチ": "#0891b2", "研修": "#16a34a", "その他": "#64748b", "不明": "#dc2626",
};

const LOCATION_GROUPS = ["事務所", "研修", "現場", "現場見学", "学校", "自宅", "その他"];
const LOC_GROUP_COLORS = { "事務所": "#fb923c", "研修": "#38bdf8", "現場": "#34d399", "現場見学": "#a78bfa", "学校": "#f472b6", "自宅": "#22d3ee", "その他": "#64748b" };

let currentDate = new Date();
let pieChart = null, locChart = null;
let locGroupMap = {};

function getMonthRange(d) {
  const y = d.getFullYear(), m = d.getMonth();
  const start = `${y}-${String(m+1).padStart(2,"0")}-01`;
  const end = m === 11 ? `${y+1}-01-01` : `${y}-${String(m+2).padStart(2,"0")}-01`;
  return { start, end };
}

async function loadLocGroups() {
  const { data } = await sb.from("location_groups").select("*");
  locGroupMap = {};
  (data || []).forEach(r => { locGroupMap[r.location_name] = r.group_name; });
}

function getLocGroup(locName) {
  return locGroupMap[locName] || null;
}

async function loadData() {
  const { start, end } = getMonthRange(currentDate);
  document.getElementById("monthLabel").textContent =
    `${currentDate.getFullYear()}年${currentDate.getMonth()+1}月`;

  await loadLocGroups();

  const { data: scans } = await sb.from("activity_scans")
    .select("*").gte("scan_date", start).lt("scan_date", end).order("scan_date", { ascending: false });

  if (!scans || scans.length === 0) {
    document.getElementById("content").innerHTML = '<div class="empty">この月のデータはありません</div>';
    return;
  }

  const scanIds = scans.map(s => s.id);
  const { data: timeLogs } = await sb.from("activity_time_logs")
    .select("*").in("scan_id", scanIds);
  const { data: locLogs } = await sb.from("location_time_logs")
    .select("*").in("scan_id", scanIds);

  render(scans, timeLogs || [], locLogs || []);
}

function render(scans, timeLogs, locLogs) {
  const totalHours = timeLogs.reduce((s, t) => s + parseFloat(t.hours), 0);
  const loggedScanIds = new Set(timeLogs.filter(t => parseFloat(t.hours) > 0).map(t => t.scan_id));
  const workDays = scans.filter(s => s.review_status !== "holiday" && loggedScanIds.has(s.id)).length;
  const avgHours = workDays > 0 ? (totalHours / workDays).toFixed(1) : "0";

  // 場所をグループ別に時間集計
  const locGroupHours = {};
  const ungroupedLocs = new Set();
  locLogs.forEach(l => {
    const group = getLocGroup(l.location);
    if (group) {
      locGroupHours[group] = (locGroupHours[group] || 0) + parseFloat(l.hours);
    } else {
      locGroupHours["その他"] = (locGroupHours["その他"] || 0) + parseFloat(l.hours);
      ungroupedLocs.add(l.location);
    }
  });
  const locGroupSorted = Object.entries(locGroupHours).sort((a,b) => b[1]-a[1]);
  const topLocation = locGroupSorted[0];

  const catMap = {};
  timeLogs.forEach(t => {
    catMap[t.category] = (catMap[t.category] || 0) + parseFloat(t.hours);
  });
  const catSorted = Object.entries(catMap).sort((a,b) => b[1]-a[1]);

  let html = `
    <div class="stats-row">
      <div class="stat-card"><div class="label">合計作業時間</div><div class="value hours">${totalHours.toFixed(1)}h</div></div>
      <div class="stat-card"><div class="label">稼働日数</div><div class="value days">${workDays}日</div></div>
      <div class="stat-card"><div class="label">1日平均</div><div class="value hours">${avgHours}h</div></div>
      <div class="stat-card"><div class="label">主な作業場所</div><div class="value location">${topLocation ? topLocation[0] : "-"}</div></div>
    </div>

    <div class="main-layout">
      <div class="left-col">
        <div class="card">
          <h2>日別ログ</h2>
          <table>
            <thead><tr><th>日付</th><th>場所</th><th>作業内容</th><th>カテゴリ内訳</th><th style="text-align:right">時間</th></tr></thead>
            <tbody>
              ${scans.map(s => {
                const dayLogs = timeLogs.filter(t => t.scan_id === s.id);
                const dayTotal = dayLogs.reduce((sum, t) => sum + parseFloat(t.hours), 0);
                const cats = dayLogs
                  .filter(t => parseFloat(t.hours) > 0)
                  .sort((a,b) => parseFloat(b.hours) - parseFloat(a.hours))
                  .map(t => {
                    if (t.category === "不明") {
                      const orig = t.original_input ? ` (${t.original_input})` : "";
                      return `<span class="day-cat unknown" onclick="openReclassify('${t.id}', ${parseFloat(t.hours)}, '${(t.original_input||"").replace(/'/g,"")}')" title="クリックで再分類">⚠ 不明${orig} ${parseFloat(t.hours)}h</span>`;
                    }
                    return `<span class="day-cat">${t.category} ${parseFloat(t.hours)}h</span>`;
                  }).join("");
                return `<tr class="editable" onclick="openEditDay('${s.id}', '${s.scan_date}')">
                  <td class="date">${s.scan_date}</td>
                  <td class="location">${s.work_location || "-"}</td>
                  <td class="task" title="${s.main_task || ""}">${s.main_task || "-"}</td>
                  <td><div class="day-categories">${cats || "-"}</div></td>
                  <td class="hours">${dayTotal > 0 ? dayTotal.toFixed(1) + "h" : "-"}</td>
                </tr>`;
              }).join("")}
            </tbody>
          </table>
        </div>
      </div>

      <div class="right-col">
        <div class="card">
          <h2>活動比率</h2>
          <div class="chart-wrap"><canvas id="pieChart"></canvas></div>
        </div>
        <div class="card">
          <h2>作業場所の内訳</h2>
          <div class="chart-wrap"><canvas id="locChart"></canvas></div>
          ${ungroupedLocs.size > 0 ? `
            <div style="margin-top:12px">
              <div style="color:var(--orange);font-size:0.8rem;margin-bottom:8px">⚠ 未分類の場所（グループを割り当て）</div>
              ${[...ungroupedLocs].map(loc => {
                const opts = LOCATION_GROUPS.map(g => `<option value="${g}">${g}</option>`).join("");
                return `<div class="edit-row" style="margin-bottom:4px">
                  <span style="flex:1;font-size:0.85rem">${loc}</span>
                  <select style="width:100px;margin:0" onchange="assignLocGroup('${loc.replace(/'/g,"\\'")}', this.value)">${opts}</select>
                </div>`;
              }).join("")}
            </div>
          ` : ""}
        </div>
        <div class="card">
          <h2>カテゴリ別 作業時間</h2>
          <table>
            <thead><tr><th>カテゴリ</th><th style="text-align:right">時間</th><th>割合</th></tr></thead>
            <tbody>
              ${catSorted.map(([cat, h]) => {
                const pct = totalHours > 0 ? (h / totalHours * 100).toFixed(1) : 0;
                const unknownTag = cat === "不明" ? ' <span class="tag tag-unknown">要修正</span>' : "";
                return `<tr><td>${cat}${unknownTag}</td><td class="hours">${h.toFixed(1)}h</td><td>${pct}%</td></tr>`;
              }).join("")}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  document.getElementById("content").innerHTML = html;

  if (pieChart) pieChart.destroy();
  const pieCtx = document.getElementById("pieChart").getContext("2d");
  pieChart = new Chart(pieCtx, {
    type: "doughnut",
    data: {
      labels: catSorted.map(([c]) => c),
      datasets: [{
        data: catSorted.map(([,h]) => h),
        backgroundColor: catSorted.map(([c]) => CATEGORY_COLORS[c] || "#64748b"),
        borderWidth: 0,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { position: "bottom", labels: { color: "#f1f5f9", font: { size: 11 }, padding: 10 } },
        datalabels: { color: "#fff", font: { size: 11, weight: "bold" }, formatter: (val, ctx) => { const total = ctx.dataset.data.reduce((a,b) => a+b, 0); const pct = (val/total*100).toFixed(0); return pct >= 5 ? pct+"%" : ""; } }
      }
    },
    plugins: [ChartDataLabels]
  });

  if (locChart) locChart.destroy();
  const locCtx = document.getElementById("locChart").getContext("2d");
  locChart = new Chart(locCtx, {
    type: "doughnut",
    data: {
      labels: locGroupSorted.map(([g]) => g),
      datasets: [{
        data: locGroupSorted.map(([,h]) => h),
        backgroundColor: locGroupSorted.map(([g]) => LOC_GROUP_COLORS[g] || "#64748b"),
        borderWidth: 0,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { position: "bottom", labels: { color: "#f1f5f9", font: { size: 11 }, padding: 10 } },
        datalabels: { color: "#fff", font: { size: 11, weight: "bold" }, formatter: (val, ctx) => { const total = ctx.dataset.data.reduce((a,b) => a+b, 0); const pct = (val/total*100).toFixed(0); return pct >= 5 ? pct+"%" : ""; } }
      }
    },
    plugins: [ChartDataLabels]
  });
}

const ALL_CATEGORIES = [
  "CAD", "設計", "測量", "点群", "文書", "文書作成", "資料作成",
  "集計・表計算", "積算", "画像", "動画", "開発", "メール",
  "会議", "Web作業", "AI活用", "調査・リサーチ", "研修", "その他"
];

function openReclassify(logId, hours, originalInput) {
  const options = ALL_CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join("");
  const modal = document.createElement("div");
  modal.className = "modal-overlay";
  modal.innerHTML = `
    <div class="modal">
      <h3>「${originalInput || "不明"}」(${hours}h) を再分類</h3>
      <select id="reclassSelect">${options}</select>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="this.closest('.modal-overlay').remove()">キャンセル</button>
        <button class="btn-save" onclick="saveReclassify('${logId}')">保存</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  modal.addEventListener("click", (e) => { if (e.target === modal) modal.remove(); });
}

async function saveReclassify(logId) {
  const select = document.getElementById("reclassSelect");
  const newCategory = select.value;
  const source = ["会議","Web作業","AI活用","調査・リサーチ","その他"].includes(newCategory) ? "web" : "file";
  const { error } = await sb.from("activity_time_logs").update({ category: newCategory, source }).eq("id", logId);
  document.querySelector(".modal-overlay")?.remove();
  if (error) {
    alert("保存に失敗しました: " + error.message);
  } else {
    loadData();
  }
}

async function assignLocGroup(locName, groupName) {
  const { data: existing } = await sb.from("location_groups").select("id").eq("location_name", locName).single();
  if (existing) {
    await sb.from("location_groups").update({ group_name: groupName }).eq("id", existing.id);
  } else {
    await sb.from("location_groups").insert({ location_name: locName, group_name: groupName });
  }
  loadData();
}

let _editScanId = null;

async function openEditDay(scanId, scanDate) {
  _editScanId = scanId;

  // 既存データ取得
  const { data: scan } = await sb.from("activity_scans").select("*").eq("id", scanId).single();
  const { data: timeLogs } = await sb.from("activity_time_logs").select("*").eq("scan_id", scanId).order("hours", { ascending: false });
  const { data: locLogs } = await sb.from("location_time_logs").select("*").eq("scan_id", scanId).order("hours", { ascending: false });

  const catOptions = ALL_CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join("");

  const timeRows = (timeLogs || []).map((t, i) => buildTimeRow(i, t.category, t.hours, catOptions)).join("");
  const locRows = (locLogs || []).map((l, i) => buildLocRow(i, l.location, l.hours)).join("");

  const modal = document.createElement("div");
  modal.className = "modal-overlay";
  modal.innerHTML = `
    <div class="modal">
      <h3>${scanDate} の編集</h3>

      <label>作業場所</label>
      <input type="text" id="editLocation" value="${scan?.work_location || ""}">

      <label>作業内容</label>
      <input type="text" id="editMainTask" value="${scan?.main_task || ""}">

      <div class="section-divider"></div>
      <label>活動カテゴリ × 時間</label>
      <div id="editTimeRows">${timeRows}</div>
      <button class="btn-add" onclick="addTimeRow()">＋ カテゴリ追加</button>

      <div class="section-divider"></div>
      <label>作業場所 × 時間</label>
      <div id="editLocRows">${locRows}</div>
      <button class="btn-add" onclick="addLocRow()">＋ 場所追加</button>

      <div class="section-divider"></div>
      <div class="modal-btns">
        <button class="btn-danger" onclick="deleteScanDay('${scanId}', '${scanDate}')">削除</button>
        <button class="btn-cancel" onclick="this.closest('.modal-overlay').remove()">キャンセル</button>
        <button class="btn-save" onclick="saveEditDay()">保存</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  modal.addEventListener("click", (e) => { if (e.target === modal) modal.remove(); });
}

async function deleteScanDay(scanId, scanDate) {
  if (!confirm(`${scanDate} のレコードを完全に削除しますか？\nファイル・Web履歴・作業時間の記録もすべて削除され、元に戻せません。`)) return;

  await sb.from("activity_time_logs").delete().eq("scan_id", scanId);
  await sb.from("location_time_logs").delete().eq("scan_id", scanId);
  await sb.from("file_logs").delete().eq("scan_id", scanId);
  await sb.from("browser_logs").delete().eq("scan_id", scanId);
  const { error } = await sb.from("activity_scans").delete().eq("id", scanId);

  document.querySelector(".modal-overlay")?.remove();
  if (error) {
    alert("削除に失敗しました: " + error.message);
  } else {
    loadData();
  }
}

let _timeIdx = 100, _locIdx = 100;
const _catOptionsCache = ALL_CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join("");

function buildTimeRow(idx, category, hours, catOptions) {
  const opts = catOptions || _catOptionsCache;
  const selected = opts.replace(`value="${category}"`, `value="${category}" selected`);
  return `<div class="edit-row" data-idx="${idx}">
    <select>${selected}</select>
    <input type="number" step="0.5" min="0" value="${hours}">
    <button class="btn-del" onclick="this.parentElement.remove()">×</button>
  </div>`;
}

function buildLocRow(idx, location, hours) {
  return `<div class="edit-row" data-idx="${idx}">
    <input type="text" value="${location}" placeholder="場所名" style="flex:1">
    <input type="number" step="0.5" min="0" value="${hours}">
    <button class="btn-del" onclick="this.parentElement.remove()">×</button>
  </div>`;
}

function addTimeRow() {
  document.getElementById("editTimeRows").insertAdjacentHTML("beforeend", buildTimeRow(_timeIdx++, "その他", 0));
}

function addLocRow() {
  document.getElementById("editLocRows").insertAdjacentHTML("beforeend", buildLocRow(_locIdx++, "", 0));
}

async function saveEditDay() {
  const scanId = _editScanId;
  const location = document.getElementById("editLocation").value.trim();
  const mainTask = document.getElementById("editMainTask").value.trim();

  // カテゴリ時間を収集
  const timeRows = document.querySelectorAll("#editTimeRows .edit-row");
  const timeData = [];
  const webCats = ["会議", "Web作業", "AI活用", "調査・リサーチ", "その他"];
  timeRows.forEach(row => {
    const cat = row.querySelector("select").value;
    const hrs = parseFloat(row.querySelector("input[type=number]").value) || 0;
    if (hrs > 0) {
      timeData.push({ scan_id: scanId, category: cat, hours: hrs, source: webCats.includes(cat) ? "web" : "file" });
    }
  });

  // 場所時間を収集
  const locRows = document.querySelectorAll("#editLocRows .edit-row");
  const locData = [];
  locRows.forEach(row => {
    const inputs = row.querySelectorAll("input");
    const loc = inputs[0].value.trim();
    const hrs = parseFloat(inputs[1].value) || 0;
    if (loc && hrs > 0) {
      locData.push({ scan_id: scanId, location: loc, hours: hrs });
    }
  });

  // DB更新
  await sb.from("activity_time_logs").delete().eq("scan_id", scanId);
  await sb.from("location_time_logs").delete().eq("scan_id", scanId);
  if (timeData.length > 0) await sb.from("activity_time_logs").insert(timeData);
  if (locData.length > 0) await sb.from("location_time_logs").insert(locData);
  await sb.from("activity_scans").update({ work_location: location, main_task: mainTask }).eq("id", scanId);

  document.querySelector(".modal-overlay")?.remove();
  loadData();
}

document.getElementById("prevMonth").onclick = () => {
  currentDate.setMonth(currentDate.getMonth() - 1);
  loadData();
};
document.getElementById("nextMonth").onclick = () => {
  currentDate.setMonth(currentDate.getMonth() + 1);
  loadData();
};

loadData();
</script>
</body>
